version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: luca-postgres
    environment:
      POSTGRES_USER: luca
      POSTGRES_PASSWORD: luca
      POSTGRES_DB: luca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luca"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
